# Defaults for toolaria plugin.
# Override in ~/.hermes/config.yaml under toolaria: key.
toolaria:
  max_result_chars: 12000         # rescue results larger than this
  fetch_max_chars: 4000           # cap on range/grep responses
  full_fetch_max_chars: 50000     # full mode refused above this (see refuse_full_fetch)
  excerpt_max_chars: 8000         # cap on short-content excerpts
  head_lines: 40
  tail_lines: 15
  json_head_items: 5
  json_tail_items: 2
  error_line_patterns: ["error", "fail", "exception", "fatal", "warn"]
  grep_timeout_ms: 500
  grep_max_pattern_len: 80
  grep_max_line_len: 2000         # per-line slice searched by grep
  ttl_hours: 72
  tombstone_ttl_hours: 720        # keep swept-blob guidance for 30 days
  # Hot-blob pinning: frequently-fetched blobs survive TTL sweeps.
  # A blob with recency-weighted fetch count >= hot_fetch_threshold uses
  # hot_ttl_hours instead of ttl_hours. The weighted count decays by half
  # every fetch_decay_half_life_hours, so a blob that was hot last week
  # but untouched since naturally drops back to the cold pool.
  hot_fetch_threshold: 3.0         # weighted count to classify as "hot"
  hot_ttl_hours: 168               # TTL for hot blobs (7 days)
  fetch_decay_half_life_hours: 24  # half-life for recency weighting
  max_store_mb: 500
  store_path: ~/.hermes/toolaria
  exclude_tools: []
  refuse_full_fetch: true         # refuse full mode over full_fetch_max_chars
  # Anchor patterns for excerpt: lines matching these patterns are promoted
  # into the excerpt even if they fall outside the head/tail window.
  # Categories: error, decision, action, value. Extends (does not replace)
  # the existing error_line_patterns for backward compatibility.
  anchor_patterns:
    error: ["error", "fail", "exception", "fatal", "warn"]
    decision: ["decided", "chose", "selected", "concluded", "approved", "rejected", "accepted", "denied"]
    action: ["created", "modified", "deleted", "updated", "wrote", "removed", "added", "changed", "renamed", "moved"]
    value: ["total", "sum", "count", "mean", "result", "average", "maximum", "minimum", "median", "percent"]
  # search mode (semantic / lexical retrieval over a rescued blob)
  search_chunk_chars: 1200        # target size of each searchable chunk
  search_chunk_overlap_lines: 2   # lines shared between adjacent chunks
  search_max_chunks: 400          # cap on chunks indexed per blob
  search_top_k: 5                 # hits returned per search
  search_snippet_chars: 400       # chars shown per hit
  embedding_model: all-MiniLM-L6-v2  # used when sentence-transformers is installed
  # pass-by-reference: expand tla:<id> tokens in downstream tool args
  passref_enabled: true
  passref_max_chars: 500000       # cap on content expanded per token
  passref_total_max_chars: 2000000  # cap on total expansion per tool call
  passref_allowed_tools: []       # strict allowlist; empty = all but exec/exfil sinks
