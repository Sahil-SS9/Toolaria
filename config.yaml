# Defaults for toolaria plugin.
# Override in ~/.hermes/config.yaml under toolaria: key.
toolaria:
  max_result_chars: 12000         # rescue results larger than this
  fetch_max_chars: 4000           # cap on range/grep responses
  full_fetch_max_chars: 50000     # full mode refused above this (see refuse_full_fetch)
  excerpt_max_chars: 8000         # cap on short-content excerpts
  head_lines: 40
  tail_lines: 15
  json_head_items: 5
  json_tail_items: 2
  error_line_patterns: ["error", "fail", "exception", "fatal", "warn"]
  grep_timeout_ms: 500
  grep_max_pattern_len: 80
  grep_max_line_len: 2000         # per-line slice searched by grep
  ttl_hours: 72
  tombstone_ttl_hours: 720        # keep swept-blob guidance for 30 days
  max_store_mb: 500
  store_path: ~/.hermes/toolaria
  exclude_tools: []
  refuse_full_fetch: true         # refuse full mode over full_fetch_max_chars
  # search mode (semantic / lexical retrieval over a rescued blob)
  search_chunk_chars: 1200        # target size of each searchable chunk
  search_chunk_overlap_lines: 2   # lines shared between adjacent chunks
  search_max_chunks: 400          # cap on chunks indexed per blob
  search_top_k: 5                 # hits returned per search
  search_snippet_chars: 400       # chars shown per hit
  embedding_model: all-MiniLM-L6-v2  # used when sentence-transformers is installed
